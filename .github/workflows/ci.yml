name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-build:
    name: index.html이 src와 일치하는지 확인
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # src/ 와 index.html 이 어긋나면 실패시킨다 (드리프트 방지).
      # check 는 외부 의존성이 필요 없어 npm install 없이 바로 실행한다.
      - run: node tools/single-file.js check
